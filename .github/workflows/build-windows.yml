name: Build Windows

on:
  workflow_dispatch:
    inputs:
      platform:
        description: ?????
        required: true
        default: x64
        type: choice
        options:
          - x64
          - Win32
      configuration:
        description: ????????
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MFC (Desktop C++ workload component)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $installPath) { throw 'Visual Studio installation not found on runner.' }
          $setup = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          $args = @(
            'modify',
            '--installPath', $installPath,
            '--add', 'Microsoft.VisualStudio.Component.VC.MFC',
            '--add', 'Microsoft.VisualStudio.Component.VC.ATL',
            '--quiet', '--wait', '--norestart'
          )
          Write-Host "Installing MFC components (may take several minutes)..."
          $p = Start-Process -FilePath $setup -ArgumentList $args -PassThru -Wait
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            throw "VS installer exited with code $($p.ExitCode)"
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          msbuild Screenshot.sln `
            /t:Rebuild `
            /p:Configuration=$config `
            /p:Platform=$platform `
            /m `
            /verbosity:minimal

      - name: Collect output
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          $outDir = Join-Path $PWD "$platform\$config"
          if (-not (Test-Path $outDir)) {
            throw "Output directory not found: $outDir"
          }
          $exe = Get-ChildItem -Path $outDir -Filter '*.exe' -ErrorAction SilentlyContinue
          if (-not $exe) {
            throw "No .exe found under $outDir"
          }
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item -Path "$outDir\*" -Destination artifact -Recurse -Force
          Write-Host "Packaged files:"
          Get-ChildItem artifact -Recurse | ForEach-Object { $_.FullName }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ inputs.platform }}-${{ inputs.configuration }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30
