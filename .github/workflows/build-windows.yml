# Build MFC project on GitHub-hosted Windows; download exe from Run Artifacts.
name: Build Windows

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: x64
        type: choice
        options:
          - x64
          - Win32
      configuration:
        description: Configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (MFC)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ inputs.platform == 'x64' && 'x64' || 'x86' }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          msbuild Screenshot.sln `
            /t:Rebuild `
            /p:Configuration=$config `
            /p:Platform=$platform `
            /m `
            /verbosity:minimal

      - name: Verify Release binary
        if: inputs.configuration == 'Release'
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $exe = Join-Path $PWD "$platform\Release\Screenshot.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "Screenshot.exe size: $size bytes"
          if ($size -lt 500000) {
            throw "Release exe is too small ($size B). Expected static MFC/MT build (usually several MB). Check vcxproj UseOfMfc=Static and RuntimeLibrary=MultiThreaded."
          }
          dumpbin /dependents $exe | Tee-Object -Variable dep
          if ($dep -match 'VCRUNTIME140|MFC140|MSVCP140') {
            throw "Release exe still depends on VC/MFC DLLs; side-by-side may fail on clean PCs."
          }

      - name: Collect output
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          $outDir = Join-Path $PWD "$platform\$config"
          if (-not (Test-Path $outDir)) {
            throw "Output directory not found: $outDir"
          }
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          if ($config -eq 'Release') {
            Copy-Item -Path "$outDir\Screenshot.exe" -Destination artifact -Force
            @"
          Screenshot (${platform} ${config})

          Release builds use static MFC and static CRT (/MT).
          You only need Screenshot.exe on Windows 10 or later (64-bit OS for x64 build).

          PDB files are debug symbols for developers; they are not required to run the app.
          "@ | Set-Content -Path artifact\README.txt -Encoding UTF8
          } else {
            Copy-Item -Path "$outDir\Screenshot.exe" -Destination artifact -Force
            Copy-Item -Path "$outDir\Screenshot.pdb" -Destination artifact -Force -ErrorAction SilentlyContinue
            @"
          Screenshot (${platform} ${config})

          Debug build: run Screenshot.exe on a PC with Visual C++ 2022 x64 debug runtime installed,
          or rebuild as Release for distribution.

          Screenshot.pdb helps Visual Studio debug crashes; not needed for normal use.
          "@ | Set-Content -Path artifact\README.txt -Encoding UTF8
          }
          Get-ChildItem artifact | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ inputs.platform }}-${{ inputs.configuration }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30
