name: Build Windows

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: x64
        type: choice
        options:
          - x64
      configuration:
        description: Configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

env:
  BUILD_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform || 'x64' }}
  BUILD_CONFIGURATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.configuration || 'Release' }}
  QT_VERSION: '6.7.3'

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: win64_msvc2019_64
          cache: true

      - name: Setup MSVC (MFC)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ env.BUILD_PLATFORM == 'x64' && 'x64' || 'x86' }}

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A $env:BUILD_PLATFORM `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config $env:BUILD_CONFIGURATION --parallel

      - name: Verify binary
        shell: pwsh
        run: |
          $config = $env:BUILD_CONFIGURATION
          $exe = Join-Path $PWD "build\$config\Screenshot.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          Write-Host "Screenshot.exe size: $((Get-Item $exe).Length) bytes"

      - name: Collect portable folder
        shell: pwsh
        run: |
          $config = $env:BUILD_CONFIGURATION
          $src = Join-Path $PWD "build\$config"
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item -Path "$src\*" -Destination artifact -Recurse -Force
          @"
          Screenshot (Qt UI + MFC capture) — $env:BUILD_PLATFORM $config

          Unzip and run Screenshot.exe. Qt DLLs are included; no Qt install required.
          Windows 10 or later recommended (x64 build for 64-bit Windows).

          settings.json is created next to the exe on first save.
          "@ | Set-Content -Path artifact\README.txt -Encoding UTF8
          Get-ChildItem artifact | Select-Object Name, Length | Format-Table

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}-${{ github.run_number }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30
