# дк GitHub ЭаЙм Windows ЛЗОГжаБрвы MFC ЯюФПЃЌВњЮядк Run вГУц Artifacts ЯТдиЁЃ
name: Build Windows

on:
  workflow_dispatch:
    inputs:
      platform:
        description: ФПБъЦНЬЈ
        required: true
        default: x64
        type: choice
        options:
          - x64
          - Win32
      configuration:
        description: БрвыХфжУ
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    # ОЕЯёвбКЌ VS2022 Enterprise + VC.ATLMFCЃЌЮоашдй modify АВзА MFC
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC (MFC)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ inputs.platform == 'x64' && 'x64' || 'x86' }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify MFC headers
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -property installationPath
          $afx = Get-ChildItem -Path $installPath -Recurse -Filter 'afxwin.h' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $afx) {
            throw 'MFC headers (afxwin.h) not found. Runner image may have changed; open an issue.'
          }
          Write-Host "Found MFC: $($afx.FullName)"

      - name: Build solution
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          msbuild Screenshot.sln `
            /t:Rebuild `
            /p:Configuration=$config `
            /p:Platform=$platform `
            /m `
            /verbosity:minimal

      - name: Collect output
        shell: pwsh
        run: |
          $platform = '${{ inputs.platform }}'
          $config = '${{ inputs.configuration }}'
          $outDir = Join-Path $PWD "$platform\$config"
          if (-not (Test-Path $outDir)) {
            throw "Output directory not found: $outDir"
          }
          $exe = Get-ChildItem -Path $outDir -Filter '*.exe' -ErrorAction SilentlyContinue
          if (-not $exe) {
            throw "No .exe found under $outDir"
          }
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item -Path "$outDir\*" -Destination artifact -Recurse -Force
          Write-Host "Packaged files:"
          Get-ChildItem artifact -Recurse | ForEach-Object { $_.FullName }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Screenshot-${{ inputs.platform }}-${{ inputs.configuration }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30
